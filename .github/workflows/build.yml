name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install flet pandas openpyxl easyocr pdfplumber arabic-reshaper python-bidi

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Build APK with Admin Privileges
      run: |
        # إعطاء الصلاحيات الكاملة للمجلد وتفعيل أمر المسؤول
        chmod -R 777 .
        sudo env "PATH=$PATH" flet build apk --yes

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: My-Accounting-App
        path: build/apk/*.apk
